<html>
<head>
  <title>FhumMoon</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="blackroomOverlay" class="blackroom-overlay">
    <audio id="backroomsMusic">
      <source src="/myinstants.mp3" type="audio/mpeg">
    </audio>
  </div>

  <button id="scaryButton" class="scary-button">totally not scary button :)</button>

  <audio id="bgMusic" autoplay loop>
    <source src="/Raise_A_Floppa_Soundtrack_[_YouConvert.net_].mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>
  <header>
    <div class="logo">
      <img src="/edited-image.png" alt="FhumMoon Logo" class="logo-icon">
      <h1>FhumMoon</h1>
    </div>
    <nav>
      <input type="search" placeholder="Search videos...">
    </nav>
  </header>

  <main>
    <div id="emptyState" class="empty-state">
      <div class="empty-state-content">
        <svg class="mascot-svg" viewBox="0 0 100 140">
          <circle cx="50" cy="30" r="20" fill="#0000ff"/> 
          <path d="M30 60 L70 60 L60 130 L40 130 Z" fill="#0000ff"/> 
          <circle cx="43" cy="25" r="3" fill="#fff"/> 
          <circle cx="57" cy="25" r="3" fill="#fff"/> 
          <path d="M40 35 Q50 45 60 35" fill="none" stroke="#fff" stroke-width="2"/> 
        </svg>
        <h2>No Videos Watched Yet</h2>
        <p>Watch your first FhumMoon video to get started!</p>
        <button class="watch-button" onclick="showVideos()">Watch Now</button>
      </div>
    </div>

    <div id="videoContainer" class="video-container" style="display: none">
      <div class="video-grid">
        <div class="video-card">
          <div class="video-wrapper">
            <video controls>
              <source src="/75918710266__133B53E0-582B-4C00-ACB1-35814F01501C.MOV" type="video/quicktime">
              Your browser does not support the video tag.
            </video>
          </div>
          <div class="video-info">
            <h2>Welcome To FhumMoon!</h2>
            <div class="video-meta">
              <svg class="views-icon" width="20" height="20" viewBox="0 0 20 20">
                <path d="M10 4.4C3.439 4.4 0 9.232 0 10c0 .766 3.439 5.6 10 5.6 6.56 0 10-4.834 10-5.6 0-.768-3.44-5.6-10-5.6zm0 9.907c-2.455 0-4.445-1.928-4.445-4.307S7.545 5.691 10 5.691s4.444 1.93 4.444 4.309-1.989 4.307-4.444 4.307z" fill="white"/>
                <circle cx="10" cy="10" r="2.5" fill="white"/>
              </svg>
              <span id="viewCount">0 views</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="chat-controls">
    <button class="chat-button" onclick="toggleChat()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
        <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
      </svg>
    </button>
    <button class="owl-button" onclick="toggleOwlVideo()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
        <path d="M12,2C6.48,2,2,6.48,2,12c0,5.52,4.48,10,10,10s10-4.48,10-10C22,6.48,17.52,2,12,2z M12,18.5 c-0.83,0-1.5-0.67-1.5-1.5h3C13.5,17.83,12.83,18.5,12,18.5z M17,16H7v-2h10V16z M15.5,9c0,1.93-1.57,3.5-3.5,3.5 S8.5,10.93,8.5,9C8.5,7.07,10.07,5.5,12,5.5S15.5,7.07,15.5,9z"/>
      </svg>
    </button>
    <button class="chater-inbox" onclick="toggleChaterInbox()">
      Chater Inbox
      <div class="chat-counter">1</div>
      <svg id="pointerArrow" class="pointer-arrow" viewBox="0 0 60 30" style="display: none;">
        <path d="M0 15 L50 15 L40 5 M50 15 L40 25" stroke="white" stroke-width="3" fill="none"/>
      </svg>
    </button>
  </div>

  <div id="chatWindow" class="chat-window">
    <div class="chat-header">
      <h3>Chat with WebSim Team</h3>
      <button class="close-chat" onclick="closeChat()">×</button>
    </div>
    <div id="chatMessages" class="chat-messages">
      <div class="message creator-message">
        <div class="message-avatar">FC</div>
        <div class="message-content">
          <div class="message-sender">FhumCreator</div>
          <div>Hey there! Thanks for visiting FhumMoon. How can I help you today?</div>
        </div>
      </div>
    </div>
    <div class="chat-input-container">
      <input type="text" id="messageInput" class="chat-input" placeholder="Type a message...">
      <button class="send-message" onclick="sendMessage()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>

  <button class="video-call-button" onclick="toggleVideoCall()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
      <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4zM14 13h-3v3H9v-3H6v-2h3V8h2v3h3v2z"/>
    </svg>
  </button>

  <div id="videoCallWindow" class="video-call-window">
    <div class="call-header">
      <h3>Video Call with Creator</h3>
      <button class="close-chat" onclick="endCall()">×</button>
    </div>
    <div class="video-container">
      <video id="creatorVideo" class="creator-video" loop>
        <source src="/75918948997__784C2929-41F9-42CB-AFA0-602AB1E7EEA7.MOV" type="video/quicktime">
        Your browser does not support the video tag.
      </video>
      <div class="user-video-preview">
        <video autoplay muted playsinline></video>
      </div>
    </div>
    <div class="call-controls">
      <button class="call-control-button toggle-audio" onclick="toggleAudio()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/>
        </svg>
      </button>
      <button class="call-control-button toggle-video" onclick="toggleVideo()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
          <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
        </svg>
      </button>
      <button class="call-control-button end-call" onclick="endCall()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
          <path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08c-.18-.17-.29-.42-.29-.7 0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.11-.7-.28-.79-.73-1.68-1.36-2.66-1.85-.33-.16-.56-.5-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="owlVideoWindow" class="video-call-window">
    <div class="call-header">
      <h3>Owl Video</h3>
      <button class="close-chat" onclick="closeOwlVideo()">×</button>
    </div>
    <div class="video-container">
      <video id="owlVideo" class="creator-video" loop>
        <source src="/download 2.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
