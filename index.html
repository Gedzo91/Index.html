<meta charset="UTF-8">
<title>Poop Clicker</title>
<style>
body {
    background: #8B4513;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #FFF;
    overflow: hidden;
}

#poop {
    width: 200px;
    height: 200px;
    cursor: pointer;
    transition: transform 0.1s;
}

#poop:active {
    transform: scale(0.95);
}

.counter {
    font-size: 2em;
    margin: 20px;
}

.floating-poop {
    position: absolute;
    pointer-events: none;
    animation: float 2s ease-out forwards;
}

@keyframes float {
    0% {
        transform: translateY(0) rotate(0deg);
        opacity: 1;
    }
    100% {
        transform: translateY(-100px) rotate(360deg);
        opacity: 0;
    }
}

.upgrade {
    background: #654321;
    border: 2px solid #432100;
    color: white;
    padding: 10px 20px;
    margin: 10px;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.2s;
}

.upgrade:hover {
    transform: scale(1.05);
}

.upgrade:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}
</style>
</head>
<body>
<h1>Poop Clicker</h1>
<div class="counter">Poops: <span id="score">0</span></div>
<div class="counter">Poops per second: <span id="pps">0</span></div>

<svg id="poop" viewBox="0 0 100 100" onclick="clickPoop()">
    <path d="M50 15C20 15 10 40 10 60C10 85 30 90 50 90C70 90 90 85 90 60C90 40 80 15 50 15Z" 
          fill="#643200"/>
    <path d="M30 40C35 45 45 45 50 40" stroke="white" fill="none" stroke-width="3"/>
    <circle cx="35" cy="30" r="5" fill="white"/>
    <circle cx="65" cy="30" r="5" fill="white"/>
</svg>

<div id="upgrades">
    <button class="upgrade" onclick="buyAutoClicker()" id="autoClickerBtn">
        Buy Auto-Clicker (Cost: 10 poops)
    </button>
    <button class="upgrade" onclick="buyMultiplier()" id="multiplierBtn">
        Buy Click Multiplier (Cost: 50 poops)
    </button>
</div>

<audio id="fartSound" src="Quick Reverb Fart - Sound Effect (HD).mp3"></audio>

<script>
let score = 0;
let autoClickers = 0;
let clickMultiplier = 1;
let autoClickerCost = 10;
let multiplierCost = 50;

function updateScore() {
    document.getElementById('score').textContent = Math.floor(score);
    document.getElementById('pps').textContent = autoClickers;
    document.getElementById('autoClickerBtn').disabled = score < autoClickerCost;
    document.getElementById('multiplierBtn').disabled = score < multiplierCost;
}

function createFloatingPoop(x, y) {
    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("viewBox", "0 0 100 100");
    svg.setAttribute("width", "50");
    svg.setAttribute("height", "50");
    svg.classList.add("floating-poop");
    svg.style.left = x + "px";
    svg.style.top = y + "px";
    
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("d", "M50 15C20 15 10 40 10 60C10 85 30 90 50 90C70 90 90 85 90 60C90 40 80 15 50 15Z");
    path.setAttribute("fill", "#643200");
    
    svg.appendChild(path);
    document.body.appendChild(svg);
    
    setTimeout(() => svg.remove(), 2000);
}

function clickPoop() {
    const fartSound = document.getElementById('fartSound');
    fartSound.currentTime = 0;
    fartSound.play();
    
    score += clickMultiplier;
    
    const poop = document.getElementById('poop');
    const rect = poop.getBoundingClientRect();
    const x = rect.left + Math.random() * rect.width;
    const y = rect.top + Math.random() * rect.height;
    
    createFloatingPoop(x, y);
    updateScore();
}

function buyAutoClicker() {
    if (score >= autoClickerCost) {
        score -= autoClickerCost;
        autoClickers++;
        autoClickerCost = Math.ceil(autoClickerCost * 1.5);
        document.getElementById('autoClickerBtn').textContent = 
            `Buy Auto-Clicker (Cost: ${autoClickerCost} poops)`;
        updateScore();
    }
}

function buyMultiplier() {
    if (score >= multiplierCost) {
        score -= multiplierCost;
        clickMultiplier++;
        multiplierCost = Math.ceil(multiplierCost * 2);
        document.getElementById('multiplierBtn').textContent = 
            `Buy Click Multiplier (Cost: ${multiplierCost} poops)`;
        updateScore();
    }
}

setInterval(() => {
    score += autoClickers;
    updateScore();
}, 1000);

updateScore();
</script>
</body></html>
