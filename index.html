<title>WebSim Desktop</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden;
  }
  #desktop {
    background-image: url('https://p2.bahamut.com.tw/B/2KU/16/edd582f58e4cf695239af836cb1d0d45.JPG');
    background-size: cover;
    background-position: center;
    height: 100%;
    position: relative;
    overflow: hidden;
  }
  #taskbar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 40px;
    background-color: rgba(0, 0, 0, 0.7);
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding: 0 10px;
  }
  #start-button {
    width: 40px;
    height: 40px;
    background-color: transparent;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 24px;
  }
  #clock {
    color: white;
    margin-left: auto;
    font-size: 14px;
  }
  .desktop-icon {
    position: absolute;
    width: 80px;
    text-align: center;
    cursor: pointer;
  }
  .desktop-icon img {
    width: 48px;
    height: 48px;
  }
  .desktop-icon span {
    display: block;
    color: white;
    text-shadow: 1px 1px 1px black;
    font-size: 12px;
    margin-top: 5px;
  }
  .window {
    position: absolute;
    min-width: 300px;
    min-height: 200px;
    background-color: #f0f0f0;
    border: 1px solid #999;
    box-shadow: 0 0 10px rgba(0,0,0,0.3);
    display: none;
    resize: both;
    overflow: hidden;
    border-radius: 5px;
  }
  .window-header {
    background-color: #e0e0e0;
    color: #333;
    padding: 5px 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: move;
  }
  .window-controls {
    display: flex;
  }
  .window-button {
    width: 16px;
    height: 16px;
    margin-left: 5px;
    cursor: pointer;
    border-radius: 50%;
  }
  .minimize { background-color: #ffbd44; }
  .maximize { background-color: #00ca56; }
  .close { background-color: #ff605c; }
  .window-content {
    height: calc(100% - 30px);
    overflow: hidden;
  }
  .window-content iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
</style>
</head>
<body>
<div id="desktop">
  <div class="desktop-icon" id="calculator-icon" style="top: 20px; left: 20px;">
    <img src="https://cdn-icons-png.flaticon.com/512/891/891175.png" alt="Calculator">
    <span>Calculator</span>
  </div>
  <div class="desktop-icon" id="notes-icon" style="top: 120px; left: 20px;">
    <img src="https://cdn-icons-png.flaticon.com/512/3075/3075908.png" alt="Notes">
    <span>Notes</span>
  </div>
  <div class="desktop-icon" id="browser-icon" style="top: 220px; left: 20px;">
    <img src="https://cdn-icons-png.flaticon.com/512/2965/2965300.png" alt="Browser">
    <span>Browser</span>
  </div>
  <div class="desktop-icon" id="ai-chat-icon" style="top: 320px; left: 20px;">
    <img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png" alt="AI Chat">
    <span>AI Chat</span>
  </div>
  <div id="taskbar">
    <div id="start-button">⊞</div>
    <div id="clock"></div>
  </div>
  <div id="calculator-window" class="window">
    <div class="window-header">
      <span>Calculator</span>
      <div class="window-controls">
        <div class="window-button minimize"></div>
        <div class="window-button maximize"></div>
        <div class="window-button close"></div>
      </div>
    </div>
    <div class="window-content">
      <iframe src="about:blank" data-src="https://websim.ai/@silvergalaxy94724932/webcalc-pro-advanced-scientific-calculator-dark-mo"></iframe>
    </div>
  </div>
  <div id="notes-window" class="window">
    <div class="window-header">
      <span>Notes</span>
      <div class="window-controls">
        <div class="window-button minimize"></div>
        <div class="window-button maximize"></div>
        <div class="window-button close"></div>
      </div>
    </div>
    <div class="window-content">
      <iframe src="about:blank" data-src="https://websim.ai/@silvergalaxy94724932/minimalist-note-taking-app-with-markdown-support"></iframe>
    </div>
  </div>
  <div id="browser-window" class="window">
    <div class="window-header">
      <span>Browser</span>
      <div class="window-controls">
        <div class="window-button minimize"></div>
        <div class="window-button maximize"></div>
        <div class="window-button close"></div>
      </div>
    </div>
    <div class="window-content">
      <iframe src="about:blank" data-src="https://websim.ai/@silvergalaxy94724932/web-browser-simulator-with-tabbed-interface-and-ad"></iframe>
    </div>
  </div>
  <div id="ai-chat-window" class="window">
    <div class="window-header">
      <span>AI Chat</span>
      <div class="window-controls">
        <div class="window-button minimize"></div>
        <div class="window-button maximize"></div>
        <div class="window-button close"></div>
      </div>
    </div>
    <div class="window-content">
      <iframe src="about:blank" data-src="https://websim.ai/c/1tbpuhjGiEX0wXkj7"></iframe>
    </div>
  </div>
</div>

<script>
  const startButton = document.getElementById('start-button');
  const desktop = document.getElementById('desktop');
  const clock = document.getElementById('clock');
  const calculatorIcon = document.getElementById('calculator-icon');
  const calculatorWindow = document.getElementById('calculator-window');
  const notesIcon = document.getElementById('notes-icon');
  const notesWindow = document.getElementById('notes-window');
  const browserIcon = document.getElementById('browser-icon');
  const browserWindow = document.getElementById('browser-window');
  const aiChatIcon = document.getElementById('ai-chat-icon');
  const aiChatWindow = document.getElementById('ai-chat-window');

  function updateClock() {
    const now = new Date();
    let hours = now.getHours();
    const minutes = now.getMinutes().toString().padStart(2, '0');
    const ampm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12;
    hours = hours ? hours : 12; // the hour '0' should be '12'
    clock.textContent = `${hours}:${minutes} ${ampm}`;
  }

  updateClock();
  setInterval(updateClock, 1000);

  function setupWindow(icon, window) {
    const header = window.querySelector('.window-header');
    const closeButton = window.querySelector('.close');
    const minimizeButton = window.querySelector('.minimize');
    const maximizeButton = window.querySelector('.maximize');
    const iframe = window.querySelector('iframe');

    icon.addEventListener('click', () => {
      window.style.display = 'block';
      if (iframe.src === 'about:blank') {
        iframe.src = iframe.dataset.src;
      }
    });

    closeButton.addEventListener('click', () => {
      window.style.display = 'none';
    });

    minimizeButton.addEventListener('click', () => {
      window.style.display = 'none';
    });

    maximizeButton.addEventListener('click', () => {
      if (window.style.width === '100%' && window.style.height === '100%') {
        window.style.width = '';
        window.style.height = '';
        window.style.top = '';
        window.style.left = '';
      } else {
        window.style.width = '100%';
        window.style.height = '100%';
        window.style.top = '0';
        window.style.left = '0';
      }
    });

    let isDragging = false;
    let dragOffsetX, dragOffsetY;

    header.addEventListener('mousedown', (e) => {
      isDragging = true;
      dragOffsetX = e.clientX - window.offsetLeft;
      dragOffsetY = e.clientY - window.offsetTop;
    });

    document.addEventListener('mousemove', (e) => {
      if (isDragging) {
        window.style.left = (e.clientX - dragOffsetX) + 'px';
        window.style.top = (e.clientY - dragOffsetY) + 'px';
      }
    });

    document.addEventListener('mouseup', () => {
      isDragging = false;
    });
  }

  setupWindow(calculatorIcon, calculatorWindow);
  setupWindow(notesIcon, notesWindow);
  setupWindow(browserIcon, browserWindow);
  setupWindow(aiChatIcon, aiChatWindow);
</script>
</body></html>
