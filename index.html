<style>
  @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;700&family=Orbitron:wght@400;700&display=swap');

  :root {
    --primary-color: #00FFFF;

    --background-color: #111111;

  }

    box-sizing: border-box;

  .sidebar {

  .sidebar h2 {

  #devTools {

  #devTools button {

  }

  #devTools button:hover {
    background-color: var(--primary-color);

  }

  .main-content {

  header {

</style>
</head>
<body>
  <canvas id="backgroundCanvas"></canvas>
  
  <div class="container">
    <aside class="sidebar">
      <h2>Developer Tools</h2>
      <ul id="devTools">
        <li><button onclick="toggleInspector()">Toggle Inspector</button></li>
        <li><button onclick="showPerformance()">Performance Metrics</button></li>
        <li><button onclick="showAccessibility()">Accessibility Check</button></li>
        <li><button onclick="runDebug()">Run Debug</button></li>
        <li><button onclick="runVisualPreview()">Run Visual Preview</button></li>
        <li><button onclick="openConsole()">Open Console</button></li>
        <li><button onclick="toggleGridOverlay()">Toggle Grid Overlay</button></li>
        <li><button onclick="generateDocumentation()">Generate Documentation</button></li>
      </ul>
    </aside>

    <main class="main-content">
      <header>
        <h1>WebSim.AI - God Developer Edition</h1>
        <p>Forge Reality with Divine Code</p>
      </header>

      <div class="divine-container">
        <div class="divine-body" id="divineBody">
          <!-- Divine output will be dynamically added here -->
        </div>
        <div class="divine-input">
          <input type="text" id="userInput" placeholder="Enter your divine command or NLP prompt...">
          <button onclick="processInput()">⚡</button>
        </div>
      </div>
    </main>
  </div>

  <div id="contextMenu" class="context-menu">
    <ul>
      <li onclick="inspectElement()">Inspect Element</li>
      <li onclick="editElement()">Edit Element</li>
      <li onclick="deleteElement()">Delete Element</li>
      <li onclick="addChildElement()">Add Child Element</li>
      <li onclick="toggleDeveloperMode()">Toggle Developer Mode</li>
      <li onclick="toggleUserMode()">Toggle User Mode</li>
    </ul>
  </div>

  <script>
    const divineBody = document.getElementById('divineBody');
    const userInput = document.getElementById('userInput');
    const contextMenu = document.getElementById('contextMenu');
    let selectedElement = null;
    let isDeveloperMode = true;

    function addOutput(content) {
      const outputDiv = document.createElement('div');
      outputDiv.classList.add('output');
      outputDiv.textContent = content;
      divineBody.appendChild(outputDiv);
      divineBody.scrollTop = divineBody.scrollHeight;
    }

    function runVisualPreview() {
      addOutput("🖼️ Running visual preview...");
      const previewWindow = window.open("", "Visual Preview", "width=800,height=600");
      const previewContent = divineBody.innerHTML;
      const previewHTML = `
        <html>
          <head>
            <style>${document.querySelector('style').textContent}</style>
          </head>
          <body>
            ${previewContent}
          </body>
        </html>
      `;
      previewWindow.document.write(previewHTML);
      previewWindow.document.close();
    }

    function runDebug() {
      addOutput("🔍 Running debug...");

      const requiredElements = ['divineBody', 'userInput', 'contextMenu', 'backgroundCanvas'];
      const missingElements = requiredElements.filter(id => !document.getElementById(id));

      if (missingElements.length > 0) {
        addOutput(`⚠️ Error: Missing elements: ${missingElements.join(', ')}`);
      } else {
        addOutput("✅ All required elements are present.");
      }

      try {
        const listenerTest = new Event('keypress');
        listenerTest.key = 'Enter';
        userInput.dispatchEvent(listenerTest);
        addOutput("✅ Event listeners are working correctly.");
      } catch (error) {
        addOutput(`⚠️ Error with event listeners: ${error.message}`);
      }

      const canvasCheck = document.getElementById('backgroundCanvas');
      if (canvasCheck.getContext) {
        addOutput("✅ Canvas is rendering correctly.");
      } else {
        addOutput("⚠️ Error: Canvas is not rendering.");
      }

      addOutput("🏁 Debug complete. Check the console for more details.");
    }

    function openConsole() {
      addOutput("🖥️ Opening console...");
      console.log("WebSim.AI Developer Console");
      alert("Check your browser's developer console (F12 or Cmd+Option+I)");
    }

    function toggleGridOverlay() {
      addOutput("📏 Toggling grid overlay...");
      const overlay = document.getElementById('gridOverlay');
      if (overlay) {
        overlay.remove();
      } else {
        const gridOverlay = document.createElement('div');
        gridOverlay.id = 'gridOverlay';
        gridOverlay.style.cssText = `
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background-image: linear-gradient(to right, rgba(255,255,255,0.1) 1px, transparent 1px),
                            linear-gradient(to bottom, rgba(255,255,255,0.1) 1px, transparent 1px);
          background-size: 20px 20px;
          pointer-events: none;
          z-index: 9999;
        `;
        document.body.appendChild(gridOverlay);
      }
    }

    function generateDocumentation() {
      addOutput("📚 Generating documentation...");
      const docWindow = window.open("", "Documentation", "width=800,height=600");
      const elements = document.body.getElementsByTagName('*');
      let documentation = '<h1>WebSim.AI - Page Documentation</h1>';
      
      for (let element of elements) {
        if (element.id) {
          documentation += `<h2>#${element.id}</h2>`;
          documentation += `<p>Tag: ${element.tagName}</p>`;
          documentation += `<p>Classes: ${element.className}</p>`;
        }
      }
      
      docWindow.document.write(documentation);
      docWindow.document.close();
    }

    function processInput() {
      try {
        const input = userInput.value.trim();
        if (input) {
          addOutput(`🙏 ${input}`);
          userInput.value = '';
          if (isDeveloperMode) {
            simulateDivineResponse(input);
          } else {
            simulateUserResponse(input);
          }
        }
      } catch (error) {
        addOutput(`⚠️ Error processing input: ${error.message}`);
        console.error("Error in processInput:", error);
      }
    }

    function simulateDivineResponse(userInput) {
      setTimeout(() => {
        try {
          const response = generateHTMLCSS(userInput);
          addOutput(`✨ Divine creation manifested:`);
          const previewDiv = document.createElement('div');
          previewDiv.classList.add('code-preview');
          previewDiv.innerHTML = `<h3>HTML</h3><code>${escapeHTML(response.html)}</code>
                                  <h3>CSS</h3><code>${escapeHTML(response.css)}</code>
                                  <h3>JavaScript</h3><code>${escapeHTML(response.js)}</code>`;
          divineBody.appendChild(previewDiv);
          divineBody.scrollTop = divineBody.scrollHeight;
        } catch (error) {
          addOutput(`⚠️ Error generating response: ${error.message}`);
          console.error("Error in simulateDivineResponse:", error);
        }
      }, 1000);
    }

    function simulateUserResponse(userInput) {
      setTimeout(() => {
        addOutput(`User input: ${userInput}`);
        addOutput("This is a simulated user response. In user mode, we don't generate code.");
      }, 1000);
    }

    function escapeHTML(str) {
      return str.replace(/[&<>'"]/g, 
        tag => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          "'": '&#39;',
          '"': '&quot;'
        }[tag] || tag)
      );
    }

    function generateHTMLCSS(prompt) {
      const elements = ['div', 'p', 'h1', 'button', 'input'];
      const colors = ['#FF5733', '#33FF57', '#3357FF', '#FF33F1', '#33FFF1'];
      const element = elements[Math.floor(Math.random() * elements.length)];
      const color = colors[Math.floor(Math.random() * colors.length)];

      return {
        html: `<${element} class="generated-element">${prompt}</${element}>`,
        css: `.generated-element {
  color: ${color};
  padding: 10px;
  margin: 5px;
  border: 1px solid ${color};
}`,
        js: `document.querySelector('.generated-element').addEventListener('click', function() {
  console.log('Element clicked!');
});`
      };
    }

    userInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        processInput();
      }
    });

    document.addEventListener('contextmenu', function(e) {
      e.preventDefault();
      selectedElement = e.target;
      contextMenu.style.display = 'block';
      contextMenu.style.left = e.pageX + 'px';
      contextMenu.style.top = e.pageY + 'px';
    });

    document.addEventListener('click', function() {
      contextMenu.style.display = 'none';
    });

    function inspectElement() {
      console.log('Inspecting:', selectedElement);
      addOutput(`Inspecting element: ${selectedElement.tagName}`);
    }

    function editElement() {
      const newContent = prompt('Enter new content for the element:', selectedElement.textContent);
      if (newContent !== null) {
        selectedElement.textContent = newContent;
      }
    }

    function deleteElement() {
      if (confirm('Are you sure you want to delete this element?')) {
        selectedElement.remove();
      }
    }

    function addChildElement() {
      const childElement = document.createElement('div');
      childElement.textContent = 'New Child Element';
      selectedElement.appendChild(childElement);
    }

    function toggleInspector() {
      console.log('Inspector toggled');
      addOutput('Inspector tool toggled');
    }

    function showPerformance() {
      console.log('Showing performance metrics');
      addOutput('Performance metrics displayed');
    }

    function showAccessibility() {
      console.log('Running accessibility check');
      addOutput('Accessibility check completed');
    }

    function toggleDeveloperMode() {
      isDeveloperMode = true;
      addOutput("🛠️ Developer mode activated");
      document.body.classList.add('developer-mode');
      document.body.classList.remove('user-mode');
    }

    function toggleUserMode() {
      isDeveloperMode = false;
      addOutput("👤 User mode activated");
      document.body.classList.add('user-mode');
      document.body.classList.remove('developer-mode');
    }

    function init() {
      try {
        particlesArray = [];
        for (let i = 0; i < 100; i++) {
          particlesArray.push(new Particle());
        }
      } catch (error) {
        console.error("Error in init:", error);
      }
    }

    function animate() {
      try {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < particlesArray.length; i++) {
          particlesArray[i].update();
          particlesArray[i].draw();
          if (particlesArray[i].size <= 0.2) {
            particlesArray.splice(i, 1);
            i--;
            particlesArray.push(new Particle());
          }
        }
        requestAnimationFrame(animate);
      } catch (error) {
        console.error("Error in animate:", error);
      }
    }

    // Interactive Background
    const canvas = document.getElementById('backgroundCanvas');
    const ctx = canvas.getContext('2d');
    let particlesArray;

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 5 + 1;
        this.speedX = Math.random() * 3 - 1.5;
        this.speedY = Math.random() * 3 - 1.5;
        this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.size > 0.2) this.size -= 0.1;
      }
      draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    init();
    animate();

    // Initial divine greeting
    addOutput("Greetings, Divine Developer. The cosmic IDE of WebSim.AI awaits your command. How shall we craft reality today?");
  </script>
</body>
</html>
