<style>
    body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: 'Courier New', monospace;
        background: #000;
        color: #0f0;
        overflow: hidden;
    }
    #canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
    }
    .interface {
        position: fixed;
        top: 20px;
        left: 20px;
        background: rgba(0,30,0,0.7);
        padding: 20px;
        border-radius: 10px;
        z-index: 10;
    }
    h1 {
        margin-top: 0;
        color: #0f0;
    }
    .slider {
        width: 200px;
        margin: 10px 0;
    }
    .button {
        background: #0f0;
        color: #000;
        border: none;
        padding: 5px 10px;
        margin: 5px;
        cursor: pointer;
    }
    #info {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: rgba(0,30,0,0.7);
        padding: 20px;
        border-radius: 10px;
    }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="interface">
    <h1>4D Calabi-Yau Manifold Visualizer</h1>
    <div>
        <label for="complexity">Complexity:</label>
        <input type="range" id="complexity" class="slider" min="1" max="100" value="50">
    </div>
    <div>
        <label for="rotation-xy">XY Rotation:</label>
        <input type="range" id="rotation-xy" class="slider" min="0" max="360" value="0">
    </div>
    <div>
        <label for="rotation-xz">XZ Rotation:</label>
        <input type="range" id="rotation-xz" class="slider" min="0" max="360" value="0">
    </div>
    <div>
        <label for="rotation-xw">XW Rotation:</label>
        <input type="range" id="rotation-xw" class="slider" min="0" max="360" value="0">
    </div>
    <div>
        <label for="w-slice">W-Slice:</label>
        <input type="range" id="w-slice" class="slider" min="-1" max="1" step="0.01" value="0">
    </div>
    <button id="auto-rotate" class="button">Toggle Auto-Rotate</button>
    <button id="toggle-color-mode" class="button">Toggle Color Mode</button>
</div>
<div id="info">Visualizing 3D slice of a 4D Calabi-Yau manifold</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const complexitySlider = document.getElementById('complexity');
const rotationXY = document.getElementById('rotation-xy');
const rotationXZ = document.getElementById('rotation-xz');
const rotationXW = document.getElementById('rotation-xw');
const wSliceSlider = document.getElementById('w-slice');
const autoRotateBtn = document.getElementById('auto-rotate');
const toggleColorModeBtn = document.getElementById('toggle-color-mode');
const info = document.getElementById('info');

let autoRotate = false;
let colorMode = 'w'; // 'w' or 'distance'

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

class CalabiYau4DManifold {
    constructor(complexity) {
        this.complexity = complexity;
        this.points = this.generatePoints(50000);
    }

    generatePoints(count) {
        const points = [];
        for (let i = 0; i < count; i++) {
            const u = Math.random() * 2 * Math.PI;
            const v = Math.random() * 2 * Math.PI;
            const [x, y, z, w] = this.calabiYauFunction(u, v);
            points.push([x, y, z, w]);
        }
        return points;
    }

    calabiYauFunction(u, v) {
        const c = this.complexity / 50; // Normalize complexity
        const x = Math.sin(c * u) * Math.cos(c * v);
        const y = Math.sin(c * u) * Math.sin(c * v);
        const z = Math.cos(c * u);
        const w = Math.sin(c * u + c * v); // Fourth dimension
        
        return [x, y, z, w];
    }

    rotatePoint4D(point, angles) {
        let [x, y, z, w] = point;
        const [angleXY, angleXZ, angleXW] = angles;

        // XY rotation
        let temp = x;
        x = x * Math.cos(angleXY) - y * Math.sin(angleXY);
        y = temp * Math.sin(angleXY) + y * Math.cos(angleXY);

        // XZ rotation
        temp = x;
        x = x * Math.cos(angleXZ) - z * Math.sin(angleXZ);
        z = temp * Math.sin(angleXZ) + z * Math.cos(angleXZ);

        // XW rotation
        temp = x;
        x = x * Math.cos(angleXW) - w * Math.sin(angleXW);
        w = temp * Math.sin(angleXW) + w * Math.cos(angleXW);

        return [x, y, z, w];
    }

    project3D(point, wSlice) {
        const [x, y, z, w] = point;
        const distance = Math.abs(w - wSlice);
        const scale = 1 / (1 + distance);
        return [x * scale, y * scale, z * scale, w];
    }

    draw(angles, wSlice) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        for (let point of this.points) {
            const rotated = this.rotatePoint4D(point, angles);
            const [x, y, z, w] = this.project3D(rotated, wSlice);
            
            const scale = 300;
            const xProjected = x * scale + canvas.width / 2;
            const yProjected = y * scale + canvas.height / 2;
            
            const distance = Math.abs(w - wSlice);
            const size = Math.max(0.5, 3 - distance * 5);
            
            ctx.beginPath();
            ctx.arc(xProjected, yProjected, size, 0, 2 * Math.PI);

            if (colorMode === 'w') {
                ctx.fillStyle = `hsl(${(w + 1) * 180}, 100%, 50%)`;
            } else { // 'distance'
                const brightness = Math.max(20, 100 - distance * 200);
                ctx.fillStyle = `hsl(${(z + 1) * 180}, 100%, ${brightness}%)`;
            }

            ctx.fill();
        }
    }
}

let manifold = new CalabiYau4DManifold(parseInt(complexitySlider.value));

function animate() {
    const angles = [
        autoRotate ? Date.now() * 0.001 : rotationXY.value * Math.PI / 180,
        autoRotate ? Date.now() * 0.0015 : rotationXZ.value * Math.PI / 180,
        autoRotate ? Date.now() * 0.002 : rotationXW.value * Math.PI / 180
    ];
    const wSlice = parseFloat(wSliceSlider.value);
    manifold.draw(angles, wSlice);
    requestAnimationFrame(animate);
}

complexitySlider.addEventListener('input', () => {
    manifold = new CalabiYau4DManifold(parseInt(complexitySlider.value));
});

autoRotateBtn.addEventListener('click', () => {
    autoRotate = !autoRotate;
    autoRotateBtn.textContent = autoRotate ? 'Stop Auto-Rotate' : 'Start Auto-Rotate';
});

toggleColorModeBtn.addEventListener('click', () => {
    colorMode = colorMode === 'w' ? 'distance' : 'w';
    toggleColorModeBtn.textContent = `Color by ${colorMode === 'w' ? 'Distance' : 'W-value'}`;
});

animate();

// Easter Egg: 4D Insight
let sliceChanges = 0;
wSliceSlider.addEventListener('input', () => {
    sliceChanges++;
    if (sliceChanges === 50) {
        alert("Eureka! Your persistent exploration of 4D space has led to a profound realization. You now perceive how the 3D slices connect into a cohesive 4D whole. This insight grants you the ability to mentally navigate 4D space with ease, opening up new avenues for understanding the fundamental structure of the universe.");
        document.body.style.animation = "dimensional-shift 10s infinite";
        document.body.style.backgroundImage = "conic-gradient(from 0deg, #ff00ff, #00ffff, #ffff00, #ff00ff)";
    }
});

</script>
</body></html>
