<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="utf-8">
<title>Glitch Pattern Flow</title>
<style>
    body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background-color: #000;
        font-family: monospace;
        font-size: 12px;
        line-height: 1;
    }
    #canvas {
        width: 100%;
        height: 100%;
        white-space: pre;
        color: #fff;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }
    .row {
        height: 1em;
        line-height: 1;
        transition: transform 0.1s ease;
    }
    #info {
        position: fixed;
        top: 10px;
        left: 10px;
        color: #fff;
        font-size: 16px;
        z-index: 10;
        text-shadow: 0 0 10px rgba(255,255,255,0.5);
    }
</style>
</head>
<body>
<div id="canvas"></div>
<div id="info">[GLITCH FLOW - click to cycle]</div>

<script>
const PATTERNS = {
    glitch: ['тЦИ','тЦУ','тЦТ','тЦС',' ','x','@','#','$','%','&','*','?','!'],
    noise: ['тЦа','тЦб','тЦв','тЦг','тЦд','тЦе','тЦж','тЦз','тЦи','тЦй','тЦк','тЦл'],
    static: ['тФМ','тФР','тФФ','тФШ','тФЬ','тФд','тФм','тФ┤','тФА','тФВ','тФ╝','тХЛ','тХВ','тХА','тХБ','тХГ','тХД','тХЕ','тХЖ'],
    corrupt: ['тЦА','тЦД','тЦМ','тЦР','тЦС','тЦТ','тЦУ','тЦИ','тЦВ','тЦГ','тЦЕ','тЦЖ','тЦЗ'],
    matrix: ['0','1',' ','*','#','@','$','%','&','?','!','=','+','-'],
    quantum: ['тг┐','тг╖','тгп','тгЯ','тб┐','тв┐','тг╗','тг╜','тг╛','тг┐'],
    chaos: ['тХ▒','тХ▓','тХ│','тФБ','тФГ','тФП','тФУ','тФЧ','тФЫ','тФг','тФл','тФ│','тФ╗','тХЛ'],
    error: ['E','R','0','R','4','0','4','!','#','@','$','%','&','*']
};

const EFFECTS = {
    glitchWave: (x, y, t, noise) => {
        const glitchInt = Math.sin(t * 5) > 0.95 ? 20 : 1;
        return (Math.sin(x * 0.1 + t + noise * glitchInt) * Math.cos(y * 0.1 + t) + 1) / 2;
    },
    staticNoise: (x, y, t, noise) => {
        return noise * 0.8 + Math.sin(x * y * 0.001 + t) * 0.2;
    },
    dataCorruption: (x, y, t, noise) => {
        const corrupt = Math.sin(t * 3) > 0.9 ? 50 : 1;
        return (Math.tan(x * 0.1 + noise * corrupt) * Math.sin(y * 0.1 + t) + 1) / 2;
    },
    quantumFlux: (x, y, t, noise) => {
        const flux = Math.cos(t * 2) > 0.95 ? 30 : 1;
        return (Math.sin(x * y * 0.01 + t + noise * flux) + 1) / 2;
    },
    artifactSpiral: (x, y, t, noise, w, h) => {
        const dx = x - w/2;
        const dy = y - h/2;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const angle = Math.atan2(dy, dx);
        const glitch = Math.sin(t * 4) > 0.9 ? 10 : 1;
        return (Math.sin(dist * 0.2 - angle * 3 + t + noise * glitch) + 1) / 2;
    }
};

class GlitchField {
    constructor(width, height) {
        this.width = width;
        this.height = height;
        this.cells = new Float32Array(width * height);
        this.noiseBuffer = new Float32Array(width * height);
        this.pattern = 'glitch';
        this.effect = 'glitchWave';
        this.time = 0;
        this.glitchTime = 0;
        this.setupCanvas();
        this.generateNoise();
    }

    generateNoise() {
        for (let i = 0; i < this.noiseBuffer.length; i++) {
            this.noiseBuffer[i] = Math.random();
        }
    }

    setupCanvas() {
        const canvas = document.getElementById('canvas');
        canvas.innerHTML = '';
        this.rows = [];
        
        for (let y = 0; y < this.height; y++) {
            const row = document.createElement('div');
            row.className = 'row';
            canvas.appendChild(row);
            this.rows.push(row);
        }
    }

    update() {
        this.time += 0.05;
        this.glitchTime += 0.1;
        
        if (Math.random() > 0.95) {
            this.generateNoise();
        }
        
        const effect = EFFECTS[this.effect];
        const cells = this.cells;
        const width = this.width;
        const height = this.height;
        const time = this.time;
        const noiseBuffer = this.noiseBuffer;
        
        for (let y = 0; y < height; y++) {
            const rowOffset = y * width;
            for (let x = 0; x < width; x++) {
                const idx = rowOffset + x;
                cells[idx] = effect(x, y, time, noiseBuffer[idx], width, height);
            }
        }
    }

    draw() {
        const patterns = PATTERNS[this.pattern];
        const patternCount = patterns.length;
        const cells = this.cells;
        const width = this.width;
        const glitchTime = this.glitchTime;
        
        for (let y = 0; y < this.height; y++) {
            const row = this.rows[y];
            let content = '';
            const rowOffset = y * width;
            
            // Add random row glitch effects
            const glitchOffset = Math.random() > 0.97 ? Math.floor(Math.random() * 5) - 2 : 0;
            row.style.transform = `translateX(${glitchOffset}px)`;
            
            for (let x = 0; x < width; x++) {
                const value = cells[rowOffset + x];
                const glitchValue = Math.random() > 0.99 ? Math.random() : value;
                const patternIndex = Math.floor(glitchValue * (patternCount - 1));
                content += patterns[patternIndex];
            }
            
            row.textContent = content;
            
            // Dynamic glitch colors
            const hue = ((y * 5 + glitchTime * 20) % 360);
            const saturation = Math.sin(glitchTime) * 30 + 70;
            const lightness = 50 + Math.random() * 20;
            row.style.color = `hsl(${hue}, ${saturation}%, ${lightness}%)`;
            
            // Random text shadow for extra glitch effect
            if (Math.random() > 0.95) {
                const shadowColor = `hsl(${(hue + 180) % 360}, 100%, 50%)`;
                row.style.textShadow = `0 0 5px ${shadowColor}`;
            } else {
                row.style.textShadow = 'none';
            }
        }
    }

    cyclePattern() {
        const patterns = Object.keys(PATTERNS);
        const effects = Object.keys(EFFECTS);
        const currentPatternIndex = patterns.indexOf(this.pattern);
        const currentEffectIndex = effects.indexOf(this.effect);
        
        if (Math.random() < 0.5) {
            this.pattern = patterns[(currentPatternIndex + 1) % patterns.length];
        } else {
            this.effect = effects[(currentEffectIndex + 1) % effects.length];
        }
        
        // Glitch effect on pattern change
        this.generateNoise();
        
        document.getElementById('info').textContent = 
            `[${this.pattern.toUpperCase()} + ${this.effect.toUpperCase()} - click to cycle]`;
    }

    resize(width, height) {
        this.width = width;
        this.height = height;
        this.cells = new Float32Array(width * height);
        this.noiseBuffer = new Float32Array(width * height);
        this.generateNoise();
        this.setupCanvas();
    }
}

let field;
let animationFrame;

function init() {
    const width = Math.floor(window.innerWidth / 12);
    const height = Math.floor(window.innerHeight / 12);
    field = new GlitchField(width, height);
    animate();
}

function animate() {
    field.update();
    field.draw();
    animationFrame = requestAnimationFrame(animate);
}

let resizeTimeout;
window.addEventListener('resize', () => {
    clearTimeout(resizeTimeout);
    cancelAnimationFrame(animationFrame);
    resizeTimeout = setTimeout(() => {
        const width = Math.floor(window.innerWidth / 12);
        const height = Math.floor(window.innerHeight / 12);
        field.resize(width, height);
        animate();
    }, 150);
});

document.addEventListener('click', () => {
    field.cyclePattern();
});

document.addEventListener('touchstart', (e) => {
    e.preventDefault();
    field.cyclePattern();
});

document.addEventListener('keypress', (e) => {
    if (e.key === ' ' || e.key === 'Enter') {
        field.cyclePattern();
    }
});

init();
</script>
</body></html>
