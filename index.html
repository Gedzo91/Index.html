<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
<style>
  body {
    margin: 0;
    background: linear-gradient(45deg, #2c3e50, #3498db);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }
  
  .game-container {
    text-align: center;
    color: white;
  }
  
  .monkey {
    font-size: 80px;
    display: inline-block;
    margin: 10px;
    cursor: pointer;
    transition: transform 0.3s;
    user-select: none;
  }
  
  .monkey:hover {
    transform: scale(1.1);
  }
  
  .dancing {
    animation: dance 0.5s infinite alternate;
  }
  
  @keyframes dance {
    0% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(10deg); }
    100% { transform: translateY(0) rotate(-10deg); }
  }
  
  .score {
    font-size: 24px;
    margin-bottom: 20px;
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(0,0,0,0.5);
    padding: 10px 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.3);
  }
  
  .stage {
    background: rgba(0,0,0,0.3);
    padding: 20px;
    border-radius: 20px;
    margin-bottom: 20px;
  }

  .shop {
    background: rgba(0,0,0,0.3);
    padding: 20px;
    border-radius: 20px;
    margin-top: 20px;
  }

  .shop-button {
    background: #27ae60;
    border: none;
    padding: 10px 20px;
    color: white;
    border-radius: 5px;
    cursor: pointer;
    margin: 5px;
    font-size: 16px;
    transition: transform 0.2s;
  }

  .shop-button:hover {
    transform: scale(1.05);
  }

  .shop-button:disabled {
    background: #95a5a6;
    cursor: not-allowed;
  }

  .points-popup {
    position: absolute;
    color: #2ecc71;
    font-weight: bold;
    pointer-events: none;
    animation: floatUp 1s forwards;
    font-size: 20px;
  }

  .stats-panel {
    position: fixed;
    top: 70px;
    right: 20px;
    background: rgba(0,0,0,0.5);
    padding: 15px;
    border-radius: 10px;
    color: white;
    text-align: left;
    box-shadow: 0 0 10px rgba(0,0,0,0.3);
  }

  @keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-50px); opacity: 0; }
  }
</style>
</head>
<body>
<div class="game-container">
  <h1>Dancing Monkeys Party!</h1>
  <div class="score">Score: <span id="score">0</span> 🍌</div>
  <div class="stats-panel">
    <h3>Statistics:</h3>
    <div>Total Clicks: <span id="totalClicks">0</span></div>
    <div>Chain Reactions: <span id="chainReactions">0</span></div>
    <div>Monkeys Owned: <span id="monkeysOwned">3</span></div>
  </div>
  <div class="stage" id="monkeyStage"></div>
  <div class="shop">
    <h2>Monkey Shop</h2>
    <button class="shop-button" id="buyBasicMonkey">Buy Basic Monkey (50 points) 🐒</button>
    <button class="shop-button" id="buyShyMonkey">Buy Shy Monkey (100 points) 🙈</button>
    <button class="shop-button" id="buyCheekyMonkey">Buy Cheeky Monkey (150 points) 🙊</button>
    <button class="shop-button" id="buyHappyMonkey">Buy Happy Monkey (200 points) 🐵</button>
  </div>
</div>

<script>
const monkeySounds = {
  '🐒': new Howl({
    src: ['https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3'],
    volume: 0.5,
    rate: 1.2
  }),
  '🙈': new Howl({
    src: ['https://assets.mixkit.co/active_storage/sfx/2868/2868-preview.mp3'],
    volume: 0.5,
    rate: 0.8
  }),
  '🙊': new Howl({
    src: ['https://assets.mixkit.co/active_storage/sfx/2870/2870-preview.mp3'],
    volume: 0.5,
    rate: 1.5
  }),
  '🐵': new Howl({
    src: ['https://assets.mixkit.co/active_storage/sfx/2871/2871-preview.mp3'],
    volume: 0.5,
    rate: 1.0
  })
};

const monkeys = ['🐒', '🙈', '🙊', '🐵'];
const monkeyPrices = {
  '🐒': 50,
  '🙈': 100,
  '🙊': 150,
  '🐵': 200
};

let score = 0;
let totalClicks = 0;
let chainReactions = 0;
const stage = document.getElementById('monkeyStage');
const scoreElement = document.getElementById('score');
const totalClicksElement = document.getElementById('totalClicks');
const chainReactionsElement = document.getElementById('chainReactions');
const monkeysOwnedElement = document.getElementById('monkeysOwned');

function updateStats() {
  totalClicksElement.textContent = totalClicks;
  chainReactionsElement.textContent = chainReactions;
  monkeysOwnedElement.textContent = stage.children.length;
}

function showPointsPopup(x, y, points) {
  const popup = document.createElement('div');
  popup.className = 'points-popup';
  popup.textContent = `+${points}`;
  popup.style.left = `${x}px`;
  popup.style.top = `${y}px`;
  document.body.appendChild(popup);
  
  setTimeout(() => popup.remove(), 1000);
}

function updateShopButtons() {
  Object.entries(monkeyPrices).forEach(([monkey, price], index) => {
    const buttons = [
      'buyBasicMonkey',
      'buyShyMonkey',
      'buyCheekyMonkey',
      'buyHappyMonkey'
    ];
    const button = document.getElementById(buttons[index]);
    button.disabled = score < price;
  });
}

function createMonkey(specificMonkey = null) {
  const monkeyElement = document.createElement('div');
  monkeyElement.className = 'monkey';
  monkeyElement.textContent = specificMonkey || monkeys[Math.floor(Math.random() * monkeys.length)];
  stage.appendChild(monkeyElement);
  updateStats();
  
  monkeyElement.addEventListener('click', (e) => {
    if (!monkeyElement.classList.contains('dancing')) {
      monkeySounds[monkeyElement.textContent].play();
      
      totalClicks++;
      monkeyElement.classList.add('dancing');
      const points = 10;
      score += points;
      scoreElement.textContent = score;
      showPointsPopup(e.pageX, e.pageY, points);
      updateShopButtons();
      updateStats();
      
      setTimeout(() => startChainReaction(monkeyElement), 300);
    }
  });
}

function startChainReaction(sourceMonkey) {
  const allMonkeys = document.querySelectorAll('.monkey');
  let hasChainReaction = false;
  
  allMonkeys.forEach(monkey => {
    if (monkey !== sourceMonkey && !monkey.classList.contains('dancing')) {
      hasChainReaction = true;
      setTimeout(() => {
        monkey.classList.add('dancing');
        monkeySounds[monkey.textContent].play();
        const points = 5;
        score += points;
        scoreElement.textContent = score;
        const rect = monkey.getBoundingClientRect();
        showPointsPopup(rect.left + rect.width/2, rect.top, points);
        updateShopButtons();
      }, Math.random() * 500);
    }
  });
  
  if (hasChainReaction) {
    chainReactions++;
    updateStats();
  }
}

function buyMonkey(monkeyType, price) {
  if (score >= price) {
    score -= price;
    scoreElement.textContent = score;
    createMonkey(monkeyType);
    updateShopButtons();
    updateStats();
    monkeySounds[monkeyType].play();
  }
}

document.getElementById('buyBasicMonkey').addEventListener('click', () => buyMonkey('🐒', 50));
document.getElementById('buyShyMonkey').addEventListener('click', () => buyMonkey('🙈', 100));
document.getElementById('buyCheekyMonkey').addEventListener('click', () => buyMonkey('🙊', 150));
document.getElementById('buyHappyMonkey').addEventListener('click', () => buyMonkey('🐵', 200));

for (let i = 0; i < 3; i++) {
  createMonkey();
}

setInterval(() => {
  if (stage.children.length < 12) {
    createMonkey();
  }
}, 3000);

setInterval(() => {
  const dancers = document.querySelectorAll('.dancing');
  dancers.forEach(dancer => {
    dancer.classList.remove('dancing');
  });
}, 5000);

updateShopButtons();
updateStats();
</script>
</body></html>
