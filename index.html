<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duck Life in WEBSIM</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="titleScreen" class="title-screen">
    <h1>Duck Life</h1>
    <h2>in WEBSIM</h2>
    <p class="shoutout">Special thanks to Trey for promoting this project! 🎉</p>
    <button id="startGame">Start Game</button>
    <audio id="clickSound" src="click.wav" preload="auto"></audio>
    <audio id="eatSound" src="roblox-eating-sound-effect-nom-nom-nom.mp3" preload="auto"></audio>
    <audio id="backgroundMusic" src="Undertale OST_ 054 - Hotel [ ezmp3.cc ].mp3" loop preload="auto"></audio>
  </div>
  
  <div id="loadingScreen" class="loading-screen" style="display: none;">
    <div class="loading-duck">
      <div class="duck-body"></div>
      <div class="duck-wing"></div>
      <div class="loading-text">Loading...</div>
    </div>
    <div class="loading-bar">
      <div class="loading-progress"></div>
    </div>
  </div>
  
  <div id="game" style="display: none;">
    <canvas id="gameCanvas"></canvas>
    <div id="stats">
      <div>Running: <span id="runningLevel">1</span></div>
      <div>Swimming: <span id="swimmingLevel">1</span></div>
      <div>Flying: <span id="flyingLevel">1</span></div>
      <div>Energy Level: <span id="energy">1</span></div>
      <div>Coins: <span class="coin-value"><span id="coins">0</span></span></div>
    </div>
    <div id="menu">
      <button id="trainRunning">Train Running</button>
      <button id="trainSwimming">Train Swimming</button>
      <button id="trainFlying">Train Flying</button>
      <button id="race">Race</button>
      <button id="shop">Shop</button>
    </div>
    <svg style="position: absolute; width: 0; height: 0;">
      <filter id="rough">
        <feTurbulence type="turbulence" baseFrequency="0.03" numOctaves="3" />
        <feDisplacementMap in="SourceGraphic" scale="2" />
      </filter>
    </svg>
  </div>
  <script type="module">
    // Add loading functionality
    async function loadAssets() {
      const assets = [
        'click.wav',
        'roblox-eating-sound-effect-nom-nom-nom.mp3',
        'Undertale OST_ 054 - Hotel [ ezmp3.cc ].mp3'
      ];
      
      const loadingProgress = document.querySelector('.loading-progress');
      let loaded = 0;
      
      for (const asset of assets) {
        try {
          await new Promise((resolve, reject) => {
            const audio = new Audio(asset);
            audio.addEventListener('canplaythrough', resolve);
            audio.addEventListener('error', reject);
          });
          loaded++;
          loadingProgress.style.width = `${(loaded / assets.length) * 100}%`;
        } catch (error) {
          console.warn(`Failed to load asset: ${asset}`, error);
        }
      }
      
      // Ensure loading screen shows for at least 2 seconds
      await new Promise(resolve => setTimeout(resolve, 2000));
      
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('game').style.display = 'block';
      
      // Initialize the game after loading
      import('./game.js').then(module => {
        const game = new module.default();
      });
    }

    // Wait for user interaction before playing audio and starting load
    document.getElementById('startGame').addEventListener('click', async () => {
      try {
        const clickSound = document.getElementById('clickSound');
        const backgroundMusic = document.getElementById('backgroundMusic');
        
        // First play the click sound
        await clickSound.play();
        
        // Then start background music
        backgroundMusic.volume = 0.5;
        await backgroundMusic.play();
        
        // Show loading screen
        document.getElementById('titleScreen').style.display = 'none';
        document.getElementById('loadingScreen').style.display = 'flex';
        
        // Start loading assets
        await loadAssets();
        
      } catch (error) {
        console.log('Audio initialization failed:', error);
        // Still continue with loading even if audio fails
        document.getElementById('titleScreen').style.display = 'none';
        document.getElementById('loadingScreen').style.display = 'flex';
        await loadAssets();
      }
    });
  </script>
</body>
</html>
