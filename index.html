<title>DuckSoft ][ Lite Emulator</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background-color: #000;
    font-family: 'Courier New', monospace;
  }
  #screen {
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #000;
    flex-direction: column;
  }
  #terminal {
    width: 100vw;
    height: 100vh;
    background-color: #0D0208;
    color: #00FF41;
    font-size: 1.2em;
    line-height: 1.6;
    overflow-y: auto;
    white-space: pre-wrap;
    padding: 20px;
    box-sizing: border-box;
    display: none;
  }
  #input {
    background-color: transparent;
    border: none;
    color: #00FF41;
    font-family: 'Courier New', monospace;
    font-size: 1.2em;
    width: 100%;
    outline: none;
  }
  .cursor {
    animation: blink 1s step-end infinite;
  }
  @keyframes blink {
    50% { opacity: 0; }
  }
  #logo {
    color: #00FF41;
    font-size: 1.2em;
    line-height: 1;
    white-space: pre;
    text-align: center;
    cursor: pointer;
  }
  #logoText {
    margin-top: 20px;
    font-size: 2em;
    color: #00FF41;
  }
</style>
</head>
<body>
<div id="screen">
  <pre id="logo">
    @@@@@@@@
  @@@@@@@@@@@@
 @@@@@@@@@@@@@@@
@@@@@@@@@@@@@@@@@@
@@@@@@@@@@@@@@@@@@
@@@@@@@@@@@@@@@@@@
 @@@@@@@@@@@@@@@@@
  @@@@@@@@@@@@@@@
   @@@@@@@@@@@@@
    @@@@@@@@@@@
     @@@@@@@@@
      @@@@@@@
       @@@@@
        @@@
         @
  </pre>
  <div id="logoText">DUCKSOFT ][ LITE</div>
</div>
<div id="terminal">
  <div id="output"></div>
  <div>
    <span>>></span>
    <input type="text" id="input" autofocus>
    <span class="cursor">█</span>
  </div>
</div>

<script>
const output = document.getElementById('output');
const input = document.getElementById('input');
const terminal = document.getElementById('terminal');
const screen = document.getElementById('screen');
const logo = document.getElementById('logo');
const logoText = document.getElementById('logoText');

let programMode = false;
let programLines = [];
let savedPrograms = {};
let currentLineNumber = 10;

const bootSequence = [
  "DUCKSOFT ][ LITE",
  "COPYRIGHT DUCKSOFT CORP 1970-1977",
  "",
  "MEMORY SIZE: 64K",
  "BASIC SYSTEM READY",
  ""
];

function typeText(text, delay = 50) {
  return new Promise(resolve => {
    let i = 0;
    const interval = setInterval(() => {
      if (i < text.length) {
        output.innerHTML += text[i];
        terminal.scrollTop = terminal.scrollHeight;
        i++;
      } else {
        clearInterval(interval);
        resolve();
      }
    }, delay);
  });
}

async function boot() {
  for (const line of bootSequence) {
    await typeText(line);
    output.innerHTML += '\n';
  }
}

screen.addEventListener('click', () => {
  screen.style.display = 'none';
  terminal.style.display = 'block';
  boot();
});

function executeKey(key) {
  if (key === 'T') {
    return commands.T();
  } else if (key.match(/^\d+\d+@[\+\-\*\/]$/)) {
    const [n1, n2, op] = key.match(/(\d+)(\d+)@([\+\-\*\/])/).slice(1);
    let result;
    switch (op) {
      case '+': result = parseInt(n1) + parseInt(n2); break;
      case '-': result = parseInt(n1) - parseInt(n2); break;
      case '*': result = parseInt(n1) * parseInt(n2); break;
      case '/': result = parseInt(n1) / parseInt(n2); break;
    }
    return result;
  } else if (key.match(/^(\d*)N@T$/)) {
    const [, n = '1'] = key.match(/^(\d*)N@T$/);
    return '@'.repeat(parseInt(n));
  } else if (key.match(/^GOTO\d+\[.+\]$/)) {
    const [, count, innerKeys] = key.match(/^GOTO(\d+)\[(.+)\]$/);
    return Array(parseInt(count)).fill().map(() => executeKey(innerKeys)).join('');
  } else if (key.match(/^SP@\d{6,}$/)) {
    const coords = key.slice(3).match(/.{2}/g).map(Number);
    const grid = Array(10).fill().map(() => Array(10).fill(' '));
    for (let i = 0; i < coords.length; i += 2) {
      const [x, y] = [coords[i], coords[i+1]];
      grid[y][x] = '@';
      if (i > 0) {
        const [prevX, prevY] = [coords[i-2], coords[i-1]];
        const dx = Math.sign(x - prevX);
        const dy = Math.sign(y - prevY);
        for (let cx = prevX, cy = prevY; cx !== x || cy !== y; cx += dx, cy += dy) {
          grid[cy][cx] = '*';
        }
      }
    }
    return grid.map(row => row.join('')).join('\n');
  } else {
    return key;
  }
}

const commands = {
  HELP: () => `
AVAILABLE COMMANDS:
  CATALOG - List available programs
  RUN [PROGRAM] - Run a program
  CLEAR - Clear the screen
  HELP - Show this help message
  PRINT [:key:...] - Print output of specified keys
  KEYPRINT [:key:...] - Execute and print output of specified keys
  HELPKEY - Show available keys and coding manual
  ENTERPROGRAMMER - Enter program mode
  LOAD (PROGRAM NAME) - Load a saved program
  [N1][N2]@[OPERATOR] - Perform arithmetic operation`,

  CATALOG: () => `
DISK VOLUME 254

 A 002 HELLO
 A 004 ADVENTURE
 A 002 CALCULATOR
 B 015 ELIZA
${Object.keys(savedPrograms).map(name => ` A ${String(savedPrograms[name].length).padStart(3, '0')} ${name.toUpperCase()}`).join('\n')}
`,

  CLEAR: () => {
    output.innerHTML = '';
    return '';
  },

  RUN: (program) => {
    if (savedPrograms[program.toLowerCase()]) {
      let result = '';
      for (const line of savedPrograms[program.toLowerCase()]) {
        const [, command, ...args] = line.split(' ');
        if (command === 'KEYPRINT') {
          result += commands.KEYPRINT(...args) + '\n';
        } else if (command === 'PRINT') {
          result += commands.PRINT(...args) + '\n';
        } else if (command === 'IF') {
          // IF commands are handled during execution
        } else {
          result += line + '\n';
        }
      }
      return result;
    }
    switch (program.toUpperCase()) {
      case 'HELLO':
        return "10 PRINT \"HELLO, WORLD!\"\n20 END\n\nHELLO, WORLD!";
      case 'ADVENTURE':
        return "WELCOME TO ADVENTURE!\n\nYOU ARE STANDING AT THE END OF A ROAD BEFORE A SMALL BRICK BUILDING.\nAROUND YOU IS A FOREST. A SMALL STREAM FLOWS OUT OF THE BUILDING AND\nDOWN A GULLY.\n\n>";
      case 'CALCULATOR':
        return "SIMPLE CALCULATOR\n\nENTER EXPRESSION (e.g. 2 + 2):\n>";
      case 'ELIZA':
        return "ELIZA - COMPUTER THERAPIST\n\nHELLO, I AM ELIZA. HOW ARE YOU FEELING TODAY?\n>";
      default:
        return `?SYNTAX ERROR\n]LIST\n10 PRINT "PROGRAM NOT FOUND"\n20 END\n\nRUN\nPROGRAM NOT FOUND`;
    }
  },

  PRINT: (...keys) => {
    return keys.join(' ');
  },

  KEYPRINT: (...keys) => {
    return keys.map(executeKey).join(' ');
  },

  HELPKEY: () => `
AVAILABLE KEYS AND CODING MANUAL:

Keys:
  NN@+ - Add two numbers
  NN@- - Subtract two numbers
  NN@* - Multiply two numbers
  NN@/ - Divide two numbers
  T - Current time
  [N]N@T - Create a line of N @'s (default 1)
  GOTON[keys] - Repeat 'keys' N times
  SP@XXYYZZ... - Create a shape with @'s connected by lines

Coding with Keys:
1. Enter program mode using ENTERPROGRAMMER command
2. Lines are automatically numbered
3. Use KEYPRINT to execute keys within your code
4. Use PRINT for regular text output
5. Use IF(condition) to create conditional statements
6. Use END to finish your program
7. Use SAVE(name) to save your program
8. Use CLEAR to clear all program lines
9. Exit program mode by entering a blank line
10. Use SHIFT+ENTER to create a new line without running the program

To load a saved program, use the LOAD (program name) command.
To run your program, use the RUN command after exiting program mode.

Example program:
10 PRINT "WHAT'S YOUR NAME?"
20 INPUT NAME
30 IF(NAME=DUCK) PRINT "QUACK!"
40 IF(NAME!=DUCK) PRINT "HELLO, " NAME
50 END
60 SAVE(GREET)

This program will:
- Ask for the user's name
- If the name is "DUCK", it will print "QUACK!"
- Otherwise, it will greet the user by name
- Save the program as "GREET"`,

  ENTERPROGRAMMER: () => {
    programMode = true;
    programLines = [];
    currentLineNumber = 10;
    return "ENTERING PROGRAM MODE\nENTER PROGRAM LINES (BLANK LINE TO EXIT):\nUSE SHIFT+ENTER FOR NEW LINE\nUSE CLEAR TO ERASE ALL LINES";
  },

  LOAD: (programName) => {
    if (savedPrograms[programName.toLowerCase()]) {
      programLines = [...savedPrograms[programName.toLowerCase()]];
      return `PROGRAM "${programName.toUpperCase()}" LOADED\n${programLines.join('\n')}`;
    } else {
      return `PROGRAM "${programName.toUpperCase()}" NOT FOUND`;
    }
  },

  T: () => {
    const now = new Date();
    return now.toLocaleTimeString();
  }
};

input.addEventListener('keydown', async (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    const inputValue = input.value.trim();
    output.innerHTML += `\n>> ${input.value}\n`;
    input.value = '';

    if (programMode) {
      if (inputValue === '') {
        programMode = false;
        await typeText("EXITING PROGRAM MODE");
      } else if (inputValue.startsWith('SAVE(') && inputValue.endsWith(')')) {
        const programName = inputValue.slice(5, -1).toLowerCase();
        savedPrograms[programName] = [...programLines];
        await typeText(`PROGRAM "${programName.toUpperCase()}" SAVED`);
      } else if (inputValue === 'CLEAR') {
        programLines = [];
        currentLineNumber = 10;
        await typeText("ALL PROGRAM LINES CLEARED");
      } else {
        const lineWithNumber = `${currentLineNumber} ${inputValue}`;
        programLines.push(lineWithNumber);
        currentLineNumber += 10;
        await typeText(lineWithNumber);
      }
    } else {
      const [mainCommand, ...args] = inputValue.toUpperCase().split(' ');

      if (commands[mainCommand]) {
        const result = commands[mainCommand](...args);
        await typeText(result);
      } else {
        await typeText("?SYNTAX ERROR");
      }
    }

    output.innerHTML += '\n\n';
    terminal.scrollTop = terminal.scrollHeight;
  } else if (e.key === 'Enter' && e.shiftKey && programMode) {
    e.preventDefault();
    const inputValue = input.value.trim();
    const lineWithNumber = `${currentLineNumber} ${inputValue}`;
    programLines.push(lineWithNumber);
    output.innerHTML += `\n${lineWithNumber}\n`;
    input.value = '';
    currentLineNumber += 10;
    terminal.scrollTop = terminal.scrollHeight;
  }
});
</script>
</body></html>
