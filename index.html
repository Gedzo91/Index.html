    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rick & Morty Intergalactic Clicker</title>
    <style>
        @font-face {
            font-family: 'GetSchwifty';
            src: url('https://cdn.jsdelivr.net/gh/jonizaak/Get-Schwifty-Font@master/get_schwifty.ttf') format('truetype');
        }

        body {
            background: #0a0a2a;
            margin: 0;
            font-family: 'Arial', sans-serif;
            color: #00ff00;
            overflow: hidden;
            background: linear-gradient(45deg, #1a0033, #000066);
        }

        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .schmeckle-button {
            width: 200px;
            height: 200px;
            cursor: pointer;
            transition: transform 0.1s;
            animation: schmecklePulse 4s linear infinite;
            margin: 20px;
            filter: drop-shadow(0 0 15px #0ff);
            border-radius: 50%;
            will-change: transform;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        @keyframes schmecklePulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 15px #0ff) brightness(1); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 25px #0ff) brightness(1.2); }
            100% { transform: scale(1); filter: drop-shadow(0 0 15px #0ff) brightness(1); }
        }

        .schmeckle-button:active {
            transform: scale(0.95);
        }

        .score {
            font-family: 'GetSchwifty', cursive;
            font-size: 3em;
            text-shadow: 
                0 0 10px #0ff,
                0 0 20px #0ff,
                0 0 30px #97FF1A,
                0 0 40px #97FF1A;
            margin: 20px;
            font-weight: normal;
            color: #97FF1A;
            transform: rotate(-5deg);
            letter-spacing: 2px;
            animation: schwifty 2s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            will-change: transform;
            transform: translateZ(0);
        }

        .score img {
            filter: drop-shadow(0 0 10px #0ff);
            animation: glowPulse 2s infinite;
        }

        @keyframes glowPulse {
            0% { filter: drop-shadow(0 0 10px #0ff); }
            50% { filter: drop-shadow(0 0 20px #0ff); }
            100% { filter: drop-shadow(0 0 10px #0ff); }
        }

        .upgrade-tab {
            position: fixed;
            right: -300px;
            top: 50%;
            transform: translateY(-50%);
            width: 300px;
            background: rgba(0, 20, 40, 0.9);
            padding: 20px;
            border-radius: 20px 0 0 20px;
            transition: right 0.3s ease;
            border-left: 4px solid #0ff;
            box-shadow: -5px 0 15px rgba(0, 255, 255, 0.2);
        }

        .upgrade-tab.open {
            right: 0;
        }

        .tab-toggle {
            position: absolute;
            left: -40px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 20, 40, 0.9);
            padding: 10px;
            border-radius: 10px 0 0 10px;
            cursor: pointer;
            border: 2px solid #0ff;
            border-right: none;
            color: #0ff;
            writing-mode: vertical-lr;
            text-orientation: upright;
        }

        .upgrade, .dimensional {
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #0ff;
            color: #0ff;
            padding: 15px 25px;
            margin: 10px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.1em;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 5px #0ff;
            position: relative;
            overflow: hidden;
            width: 100%;
            box-sizing: border-box;
        }

        .upgrade:before, .dimensional:before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(0,255,255,0.1), transparent);
            transform: rotate(45deg);
            animation: shineEffect 3s infinite;
        }

        @keyframes shineEffect {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .upgrade:hover, .dimensional:hover {
            background: rgba(0, 255, 255, 0.2);
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0,255,255,0.3);
        }

        #gif-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        #gif-overlay img {
            max-width: 100%;
            max-height: 100%;
        }

        #ufo-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><rect width="100%" height="100%" fill="black"/><circle cx="2" cy="2" r="1" fill="white"/></svg>') repeat,
                        linear-gradient(45deg, #000033, #000066);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        #ufo-overlay img {
            max-width: 300px;
            max-height: 300px;
        }

        .floating-rick {
            position: absolute;
            font-size: 2em;
            pointer-events: none;
            animation: float 3s ease-out forwards;
            opacity: 0;
            font-family: 'GetSchwifty', cursive;
            color: #97FF1A;
            text-shadow: 0 0 10px #0ff;
            will-change: transform, opacity;
            transform: translateZ(0);
        }

        @keyframes float {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        .post-rebirth-upgrade {
            background: rgba(255, 0, 255, 0.1) !important;
            border: 2px solid #ff00ff !important;
            color: #ff00ff !important;
            display: none;
        }

        .post-rebirth-upgrade:before {
            background: linear-gradient(45deg, transparent, rgba(255,0,255,0.1), transparent) !important;
        }

        .post-rebirth-upgrade:hover {
            background: rgba(255, 0, 255, 0.2) !important;
            box-shadow: 0 0 20px rgba(255,0,255,0.3) !important;
        }

        @keyframes floatAround {
            0% { transform: translate(0, 0); }
            25% { transform: translate(200px, 100px); }
            50% { transform: translate(0, 200px); }
            75% { transform: translate(-200px, 100px); }
            100% { transform: translate(0, 0); }
        }

        #floating-credit {
            animation: floatAround 10s infinite ease-in-out;
        }
    </style>
</head>
<body>
    <div id="start-screen" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: url('/Start screen Backdrop.jpg') center center / cover no-repeat; z-index: 2000; display: flex; justify-content: center; align-items: center; flex-direction: column; cursor: pointer;">
        <img src="/Start Screen.gif" alt="Rick and Morty Start Screen Animation" style="max-width: 100%; max-height: 80vh;">
        <div id="floating-credit" style="position: absolute; color: #97FF1A; font-family: 'GetSchwifty', cursive; font-size: 2em; text-shadow: 0 0 10px #0ff;">made by Domopremo</div>
    </div>
    <div class="game-container">
        <div class="score">
            <span style="display: flex; align-items: center; gap: 10px;">
                <span id="counter">0</span>
                <img src="/Schmeckles.png" alt="Schmeckles text in bright green letters" style="height: 40px; width: auto;">
            </span>
        </div>
        <img src="/Schmeckles.jpg" alt="Rick Sanchez neon green head on manhole cover with Schmeckles text" class="schmeckle-button" onclick="clickPortal(event)" width="200" height="200">
    </div>

    <div class="upgrade-tab" id="upgradeTab">
        <div class="tab-toggle" onclick="toggleUpgradeTab()">UPGRADES</div>
        <div id="upgrades">
            <button class="upgrade" onclick="buyUpgrade('morty', 10)">Hire Morty (10 Schmeckles)</button>
            <button class="upgrade" onclick="buyUpgrade('rick', 50)">Hire Rick (50 Schmeckles)</button>
            <button class="upgrade" onclick="buyUpgrade('portal', 100)">Portal Gun Upgrade (100 Schmeckles)</button>
            <button class="upgrade" onclick="buyUpgrade('summer', 500)">Summer's Gadget (500 Schmeckles)</button>
            <button class="upgrade" onclick="buyUpgrade('birdperson', 2000)">Birdperson's Wisdom (2000 Schmeckles)</button>
        </div>
        <div id="post-rebirth-upgrades">
            <button class="upgrade post-rebirth-upgrade" onclick="buyUpgrade('meeseeks', 5000)">Mr. Meeseeks Box (5000 Schmeckles)</button>
            <button class="upgrade post-rebirth-upgrade" onclick="buyUpgrade('unity', 10000)">Unity's Hivemind (10000 Schmeckles)</button>
            <button class="upgrade post-rebirth-upgrade" onclick="buyUpgrade('council', 25000)">Council of Ricks (25000 Schmeckles)</button>
            <button class="upgrade post-rebirth-upgrade" onclick="buyUpgrade('citadel', 50000)">Citadel Technology (50000 Schmeckles)</button>
            <button class="upgrade post-rebirth-upgrade" onclick="buyUpgrade('centralfinite', 100000)">Central Finite Curve (100000 Schmeckles)</button>
        </div>
        <button class="dimensional" id="dimensionalButton" style="display: none;" onclick="startAdventure()">Dimensional Travel (1M Schmeckles)</button>
    </div>

    <div id="gif-overlay">
        <img src="/Dimensional Travel.gif" alt="Dimensional Travel Animation">
    </div>

    <div id="ufo-overlay">
        <img src="/UFOnew.gif" alt="UFO animation with space background">
    </div>

    <script>
        let schmeckles = 0;
        let clickPower = 1;
        let autoClickPower = 0;
        let rebirthMultiplier = 1;
        let upgrades = {  
            morty: { cost: 10, power: 0.1 },
            rick: { cost: 50, power: 1 },
            portal: { cost: 100, multiplier: 2 },
            summer: { cost: 500, power: 5 },
            birdperson: { cost: 2000, power: 20 },
            meeseeks: { cost: 5000, power: 50 },
            unity: { cost: 10000, power: 100 },
            council: { cost: 25000, power: 250 },
            citadel: { cost: 50000, power: 500 },
            centralfinite: { cost: 100000, power: 1000 }
        };

        let hasReachedUFOBonus = false;
        let hasRebirthed = false;

        const counterElement = document.getElementById('counter');
        const upgradeButtons = document.querySelectorAll('.upgrade');
        const dimensionalButton = document.getElementById('dimensionalButton');
        const ufoOverlay = document.getElementById('ufo-overlay');

        function toggleUpgradeTab() {
            const tab = document.getElementById('upgradeTab');
            tab.classList.toggle('open');
        }

        function createFloatingText(x, y, amount) {
            const fragment = document.createDocumentFragment();
            const text = document.createElement('div');
            text.className = 'floating-rick';
            text.textContent = `+${amount} schmeckles!`;
            text.style.left = `${x}px`;
            text.style.top = `${y}px`;
            fragment.appendChild(text);
            document.body.appendChild(fragment);
            requestAnimationFrame(() => {
                setTimeout(() => text.remove(), 3000);
            });
        }

        function clickPortal(event) {
            schmeckles += clickPower * rebirthMultiplier;
            if (event) {
                createFloatingText(event.clientX, event.clientY, clickPower * rebirthMultiplier);
            }
            updateDisplay();
            checkDimensionalButton();
        }

        function buyUpgrade(type, cost) {
            if (schmeckles >= upgrades[type].cost) {
                schmeckles -= upgrades[type].cost;
                if (type === 'portal') {
                    clickPower *= upgrades[type].multiplier;
                } else {
                    autoClickPower += upgrades[type].power;
                }
                upgrades[type].cost = Math.floor(upgrades[type].cost * 1.5);
                updateDisplay();
            }
        }

        function updateDisplay() {
            const newSchmeckles = Math.floor(schmeckles);
            if (counterElement.textContent !== newSchmeckles.toString()) {
                counterElement.textContent = newSchmeckles;
            }
            
            upgradeButtons.forEach(btn => {
                const type = btn.textContent.toLowerCase().split('(')[0].trim().replace(/ /g, '').replace("'s", '');
                if (upgrades[type]) {
                    const newText = `${btn.textContent.split('(')[0]} (${upgrades[type].cost} Schmeckles)`;
                    if (btn.textContent !== newText) {
                        btn.textContent = newText;
                    }
                }
            });

            if (!hasReachedUFOBonus && schmeckles >= 100000) {
                triggerUFOBonus();
            }

            const shouldShowDimensional = schmeckles >= 1000000;
            if (shouldShowDimensional !== (dimensionalButton.style.display === 'block')) {
                dimensionalButton.style.display = shouldShowDimensional ? 'block' : 'none';
            }
        }

        function triggerUFOBonus() {
            hasReachedUFOBonus = true;
            ufoOverlay.style.display = 'flex';
            setTimeout(() => {
                ufoOverlay.style.display = 'none';
                schmeckles += 100000;
                updateDisplay();
            }, 5000);
        }

        let lastAutoClickTime = performance.now();
        function autoClickLoop(currentTime) {
            if (autoClickPower > 0) {
                if (currentTime - lastAutoClickTime >= 100) {
                    schmeckles += autoClickPower * rebirthMultiplier;
                    updateDisplay();
                    lastAutoClickTime = currentTime;
                }
            }
            requestAnimationFrame(autoClickLoop);
        }
        requestAnimationFrame(autoClickLoop);

        let saveTimeout = null;
        function saveGame() {
            if (saveTimeout) return;
            
            saveTimeout = setTimeout(() => {
                const gameState = {
                    schmeckles: schmeckles,
                    clickPower: clickPower,
                    autoClickPower: autoClickPower,
                    rebirthMultiplier: rebirthMultiplier,
                    upgrades: upgrades,
                    hasReachedUFOBonus: hasReachedUFOBonus,
                    hasRebirthed: hasRebirthed
                };
                try {
                    localStorage.setItem('rickClickerSave', JSON.stringify(gameState));
                } catch (e) {
                    console.warn('Failed to save game state:', e);
                }
                saveTimeout = null;
            }, 100);
        }

        function loadGame() {
            try {
                const savedGame = localStorage.getItem('rickClickerSave');
                if (savedGame) {
                    const gameState = JSON.parse(savedGame);
                    Object.assign(window, {
                        schmeckles: gameState.schmeckles,
                        clickPower: gameState.clickPower,
                        autoClickPower: gameState.autoClickPower,
                        rebirthMultiplier: gameState.rebirthMultiplier,
                        hasReachedUFOBonus: gameState.hasReachedUFOBonus,
                        hasRebirthed: gameState.hasRebirthed
                    });
                    Object.assign(upgrades, gameState.upgrades);
                    
                    updateDisplay();
                    
                    if (hasRebirthed) {
                        document.querySelectorAll('.post-rebirth-upgrade')
                            .forEach(btn => btn.style.display = 'block');
                    }
                }
            } catch (e) {
                console.warn('Failed to load game state:', e);
            }
        }

        setInterval(saveGame, 30000);
        window.addEventListener('load', loadGame);

        document.getElementById('upgradeTab').classList.add('open');

        document.getElementById('start-screen').addEventListener('click', function() {
            this.style.opacity = '0';
            this.style.transition = 'opacity 1s';
            setTimeout(() => {
                this.style.display = 'none';
            }, 1000);
        });
    </script>
</body>
</html>
